<!DOCTYPE html>
<html>
    <head>
        <title>{{ title }}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href = "{{ url_for('static', path='style.css')}}">
    </head>
    <body>
        <div class="nav_bar">
            <a href="{{ url_for('home') }}">
            <img src="{{ url_for('static', path='logo.jpg') }}" class="logo" alt="Our logo">
            </a>

            <div class="search_container">
                <input type="text" placeholder="Search..." class="search_bar">
            </div>

            <!-- <div class="nav_group">
                <button class="login_button"
                                    type="button"
                                    data-bs-toggle="modal"
                                    data-bs-target="#createPostModal">New Post</button>
                <button class="login_button" >Log in</button>
                <button class="register_button">Register</button>
                <img src="{{ url_for('static', path='swirly.png') }}" class="swirly" alt="swirly">
            </div> -->

            <!-- Shown when logged in (hidden by default, shown via JS) -->
             
            <div id="loggedInNav" class="nav_group">
            <button class="login_button"
                    type="button"
                    data-bs-toggle="modal"
                    data-bs-target="#createPostModal">New Post</button>
            <span id="usernameDisplay" class="navbar-text me-md-2"></span>
            <button class="register_button"
                    type="button"
                    id="logoutBtn">Logout</button>
            </div>
            <!-- Shown when logged out -->
            <div id="loggedOutNav" class="nav_group">
            <a href="{{ url_for('login_page') }}"> <button class="login_button">Log in</button> </a>
            <a href="{{ url_for('register_page') }}"> <button class="register_button">Register</button> </a>
            <img src="{{ url_for('static', path='swirly.png') }}" class="swirly" alt="swirly">
            </div>
        </div>

        <main>
            {% block content %}
            {% endblock content %}
        </main>

        <script type="module">
        import { getCurrentUser, logout } from '/static/auth.js';

        // Update navbar based on auth state
        async function updateAuthUI() {
            const user = await getCurrentUser();
            const loggedInNav = document.getElementById('loggedInNav');
            const loggedOutNav = document.getElementById('loggedOutNav');

            if (user) {
            loggedInNav.classList.remove('d-none');
            loggedInNav.classList.add('d-flex');
            loggedOutNav.classList.add('d-none');
            document.getElementById('usernameDisplay').textContent = user.email;
            } else {
            loggedInNav.classList.add('d-none');
            loggedInNav.classList.remove('d-flex');
            loggedOutNav.classList.remove('d-none');
            }
        }

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', logout);

        // Update UI on page load
        updateAuthUI();
        </script>

        <!--MODALS---------------------->
        <!-- Create post modal -->
        <div class="modal fade"
             id="createPostModal"
             tabindex="-1"
             aria-labelledby="createPostModalLabel"
             aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="createPostModalLabel">New Post</h5>
                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <form id="createPostForm">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="movie_title" class="form-label">Title</label>
                                <input type="text" class="form-control" id="movie_title" name="movie_title" required>
                            </div>
                            <div class="mb-3">
                                <label for="score" class="form-label">Score</label>
                                <input type="text" class="form-control" id="score" name="score" required>
                            </div>
                            <div class="mb-3">
                                <label for="content" class="form-label">Content</label>
                                <textarea class="form-control" id="content" name="content" rows="5" required></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button"
                                    class="btn btn-outline-secondary"
                                    data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Post</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <!-- Success Modal -->
        <div class="modal fade"
             id="successModal"
             tabindex="-1"
             aria-labelledby="successModalLabel"
             aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title" id="successModalLabel">Success</h5>
                        <button type="button"
                                class="btn-close btn-close-white"
                                data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p id="successMessage" class="fs-5"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Error Modal -->
        <div class="modal fade"
             id="errorModal"
             tabindex="-1"
             aria-labelledby="errorModalLabel"
             aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-danger text-white">
                        <h5 class="modal-title" id="errorModalLabel">Error</h5>
                        <button type="button"
                                class="btn-close btn-close-white"
                                data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p id="errorMessage" class="fs-5"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
        <!--MODALS---------------------->
        
        <!-- Create Post Form Handler -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module">
    import {
    getErrorMessage,
    hideModal,
    showModal,
    } from "/static/utils.js";

    const createForm = document.getElementById("createPostForm");

    createForm.addEventListener("submit", async (event) => {
    // Stop default form submission - we'll handle it with JavaScript
    event.preventDefault();

    // Gather form values into a plain object {title: "...", content: "..."}
    const formData = new FormData(createForm);
    const postData = Object.fromEntries(formData.entries());

    // TEMPORARY - hardcoded until authorization (Tutorial 11)
    postData.user_id = 1;

    try {
        // POST to API as JSON
        const response = await fetch("/api/reviews", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify(postData),
        });

        if (response.ok) {
        const data = await response.json();
        document.getElementById("successMessage").textContent =
            `Post "${data.title}" created successfully!`;

        hideModal("createPostModal");
        showModal("successModal");

        // Clear form
        createForm.reset();

        // Reload page after modal is hidden to show new post
        document
            .getElementById("successModal")
            .addEventListener(
            "hidden.bs.modal",
            () => {
                window.location.reload();
            },
            { once: true },
            );
        } else {
        const error = await response.json();
        document.getElementById("errorMessage").textContent =
            getErrorMessage(error);

        hideModal("createPostModal");
        showModal("errorModal");
        }
    } catch (error) {
        document.getElementById("errorMessage").textContent =
        "Network error. Please check your connection and try again.";
        showModal("errorModal");
    }
    });
        </script>
        
        {% block scripts %}
        {% endblock scripts %}

    </body>
</html>
